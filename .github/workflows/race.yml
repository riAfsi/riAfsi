name: Corrida de Carrinhos

on:
  schedule:
    - cron: "0 */6 * * *"    # Roda a cada 6 horas
  workflow_dispatch:          # Permite rodar manualmente

jobs:
  race:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar a biblioteca para desenhar imagens
        run: pip install pillow

      - name: Executar o script da corrida
        run: python scripts/race.py

      - name: Salvar a imagem atualizada no repositório
        uses: EndBug/add-and-commit@v9
        with:
          branch: main
          message: '🏎️ Atualiza posição dos carrinhos'
          add: 'race.png'
