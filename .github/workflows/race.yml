name: Corrida de Carrinhos

on:
  schedule:
    - cron: "*/30 * * * *"    # A cada 30 minutos (mais frequente para animação)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  race:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Pillow
        run: pip install pillow

      - name: Executar script da corrida
        run: python scripts/race.py

      - name: Commit do GIF e estado
        uses: EndBug/add-and-commit@v9
        with:
          add: 'race.gif estado.json'
          message: '🏎️ Atualiza corrida (GIF animado)'
          default_author: github_actions
